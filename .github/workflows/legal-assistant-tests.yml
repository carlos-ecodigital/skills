name: legal-assistant tests

# v3.5.x Scope T — gate PRs that touch legal-assistant on the pytest harness.
# 88 tests as of v3.5.4; add to tests/ per the discipline rule: no render-
# logic change ships without a unit test exercising the new branch.
#
# v4.0-rc3.1 (Sites stream) — expanded to cover:
#   - sites/loi  (25 tests)
#   - sites/hot  (22 tests)
#   - sites/_shared  (130 tests: 110 chassis + 20 normalise_placeholder)
#   - sites/_shared/document_parsers  (95 tests)
#   - sites/tests  (integration, 38 tests)
# Plus a scaffolding-marker gate that blocks rc-level TODO markers from
# reaching the engine production path.

on:
  pull_request:
    paths:
      - '.claude/skills/legal-assistant/**'
      - '.claude/skills/_shared/counterpart-description-framework.md'
      - '.claude/skills/_shared/loi-*.md'
      - '.claude/skills/document-factory/generate.py'
      - '.github/workflows/legal-assistant-tests.yml'
  push:
    branches:
      - main
      - 'carlos/loi-v3.5*'
      - 'carlos/sites-stream-v4.0*'
    paths:
      - '.claude/skills/legal-assistant/**'
      - '.claude/skills/_shared/counterpart-description-framework.md'
      - '.claude/skills/_shared/loi-*.md'
      - '.claude/skills/document-factory/generate.py'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # v3.5.8 tripwire #4: need merge-base for diff

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest python-docx pyyaml lxml
          # PyMuPDF is optional — sites parsers degrade gracefully without
          # it. Install explicitly so the parser test suite actually runs.
          pip install pymupdf

      # v3.5.8 PRINCIPLES.md tripwire #4: render-logic changes must ship
      # with a test change. Escape hatch for doc-only / comment-only edits
      # where the author knows tests are unnecessary: include the literal
      # marker [skip-test-check] in any commit message on the branch.
      - name: Enforce test-changes-with-generator-changes
        if: github.event_name == 'pull_request'
        run: |
          set -e
          BASE="origin/${{ github.base_ref }}"
          echo "Base: $BASE / Head: ${{ github.sha }}"
          CHANGED=$(git diff --name-only "$BASE"...HEAD)
          echo "--- Changed files ---"
          echo "$CHANGED"
          echo "---------------------"
          # Colocation (sales/) gate
          SALES_GEN=$(echo "$CHANGED" | grep -E '^\.claude/skills/legal-assistant/sales/generate_loi\.py$' || true)
          SALES_TESTS=$(echo "$CHANGED" | grep -E '^\.claude/skills/legal-assistant/sales/tests/' || true)
          # Sites/LOI gate. Accept tests in any of: sites/loi/tests/,
          # sites/tests/ (integration), sites/_shared/tests/ (chassis-level
          # behavioural tests that exercise LOI via the shared base class).
          # rc3.2 / rc3.3 / rc3.4 surfaced this — engine refactors legitimately
          # ship test coverage in adjacent dirs; the rc3.1-original strict
          # path was over-narrow.
          SITES_LOI_GEN=$(echo "$CHANGED" | grep -E '^\.claude/skills/legal-assistant/sites/loi/generate_site_loi\.py$' || true)
          SITES_LOI_TESTS=$(echo "$CHANGED" | grep -E '^\.claude/skills/legal-assistant/sites/(loi/tests|tests|_shared/tests)/' || true)
          # Sites/HoT gate (same widening — sites/tests/ + sites/_shared/tests/).
          SITES_HOT_GEN=$(echo "$CHANGED" | grep -E '^\.claude/skills/legal-assistant/sites/hot/generate_site_hot\.py$' || true)
          SITES_HOT_TESTS=$(echo "$CHANGED" | grep -E '^\.claude/skills/legal-assistant/sites/(hot/tests|tests|_shared/tests)/' || true)
          # Shared chassis gate. Accept tests in sites/_shared/tests/ AND
          # sites/tests/ — chassis changes often need integration coverage.
          SITES_SHARED_SRC=$(echo "$CHANGED" | grep -E '^\.claude/skills/legal-assistant/sites/_shared/[^/]+\.py$' || true)
          SITES_SHARED_TESTS=$(echo "$CHANGED" | grep -E '^\.claude/skills/legal-assistant/sites/(_shared/tests|tests)/' || true)
          # Escape hatch
          if git log --format=%B "$BASE"...HEAD | grep -q '\[skip-test-check\]'; then
            echo "Escape-hatch [skip-test-check] present — test-balance check skipped."
            exit 0
          fi
          fail=0
          if [ -n "$SALES_GEN" ] && [ -z "$SALES_TESTS" ]; then
            echo "ERROR: sales/generate_loi.py changed with no accompanying sales/tests/ change."
            fail=1
          fi
          if [ -n "$SITES_LOI_GEN" ] && [ -z "$SITES_LOI_TESTS" ]; then
            echo "ERROR: sites/loi/generate_site_loi.py changed with no accompanying sites/loi/tests/ change."
            fail=1
          fi
          if [ -n "$SITES_HOT_GEN" ] && [ -z "$SITES_HOT_TESTS" ]; then
            echo "ERROR: sites/hot/generate_site_hot.py changed with no accompanying sites/hot/tests/ change."
            fail=1
          fi
          if [ -n "$SITES_SHARED_SRC" ] && [ -z "$SITES_SHARED_TESTS" ]; then
            echo "ERROR: sites/_shared/*.py changed with no accompanying sites/_shared/tests/ change."
            fail=1
          fi
          if [ "$fail" -ne 0 ]; then
            echo "Render-logic changes must ship with a test exercising the new branch."
            echo "If this change is genuinely test-free (pure docstring / comment),"
            echo "add [skip-test-check] to any commit message on the branch."
            exit 1
          fi
          echo "OK: generator/test change balance satisfied."

      # rc3.1 tripwire — scaffolding markers on the engine production path.
      # v0.1 scaffolding (``TODO(Phase B5)``, ``TODO: delegate to ...``) is
      # what let placeholder-leaks + passthrough stubs reach production in
      # rc1. Fail the build if any engine .py (excluding tests/) still
      # carries such a marker.
      - name: Scaffolding-marker gate (sites production path)
        run: |
          set -e
          echo "Scanning sites/ production code for TODO(Phase …) / TODO: delegate markers…"
          # Production path only — exclude tests/ dirs and .md files.
          hits=$(find .claude/skills/legal-assistant/sites -name '*.py' \
                   -not -path '*/tests/*' \
                   -print0 \
                 | xargs -0 grep -En 'TODO\(Phase |TODO: delegate to ' || true)
          if [ -n "$hits" ]; then
            echo "----- scaffolding markers found -----"
            echo "$hits"
            echo "-------------------------------------"
            echo "Fail: sites/ production code must not carry rc-level"
            echo "scaffolding markers. Replace the stub with a real"
            echo "implementation (or delete the line) before merging."
            exit 1
          fi
          echo "OK: no scaffolding markers on sites/ production path."

      # --- legal-assistant/sales (colocation) -----------------------------

      - name: Run legal-assistant/sales tests
        working-directory: .claude/skills/legal-assistant/sales
        run: |
          python -m pytest tests/ -v

      - name: Smoke-regen all intake examples
        working-directory: .claude/skills/legal-assistant/sales
        run: |
          set -e
          for f in examples/intake_example_*.yaml; do
            echo "--- Regenerating: $f ---"
            python3 generate_loi.py "$f"
          done
          rm -f *.docx *_qa.txt

      - name: Smoke-regen v3.5 regression fixtures
        working-directory: .claude/skills/legal-assistant/sales
        run: |
          set -e
          for f in regression/v3.5/*_intake.yaml; do
            echo "--- Regenerating: $f ---"
            python3 generate_loi.py "$f"
          done
          rm -f *.docx *_qa.txt

      # --- legal-assistant/sites (Sites stream — rc3.1) -------------------

      - name: Run legal-assistant/sites/_shared tests (chassis + parsers)
        working-directory: .claude/skills/legal-assistant/sites/_shared
        run: |
          python -m pytest tests/ -v

      - name: Run legal-assistant/sites/_shared/document_parsers tests
        working-directory: .claude/skills/legal-assistant/sites/_shared/document_parsers
        run: |
          python -m pytest tests/ -v

      - name: Run legal-assistant/sites/loi tests
        working-directory: .claude/skills/legal-assistant/sites/loi
        run: |
          python -m pytest tests/ -v

      - name: Run legal-assistant/sites/hot tests
        working-directory: .claude/skills/legal-assistant/sites/hot
        run: |
          python -m pytest tests/ -v

      - name: Run legal-assistant/sites/tests (integration)
        working-directory: .claude/skills/legal-assistant/sites/tests
        run: |
          python -m pytest . -v

      - name: Smoke-regen Van Gog LOI
        working-directory: .claude/skills/legal-assistant/sites/loi
        run: |
          set -e
          python3 generate_site_loi.py examples/deal_van-gog.yaml --out-dir /tmp/rc3-smoke
          ls -la /tmp/rc3-smoke
          rm -rf /tmp/rc3-smoke

      - name: Smoke-regen Moerman HoT
        working-directory: .claude/skills/legal-assistant/sites/hot
        run: |
          set -e
          if [ -f examples/deal_moerman.yaml ]; then
            python3 generate_site_hot.py examples/deal_moerman.yaml --out-dir /tmp/rc3-hot-smoke
            ls -la /tmp/rc3-hot-smoke
            rm -rf /tmp/rc3-hot-smoke
          else
            echo "NOTE: sites/hot/examples/deal_moerman.yaml not present — skipping smoke-regen."
          fi
