name: legal-assistant tests

# v3.5.x Scope T — gate PRs that touch legal-assistant on the pytest harness.
# 88 tests as of v3.5.4; add to tests/ per the discipline rule: no render-
# logic change ships without a unit test exercising the new branch.

on:
  pull_request:
    paths:
      - '.claude/skills/legal-assistant/**'
      - '.claude/skills/_shared/counterpart-description-framework.md'
      - '.claude/skills/_shared/loi-*.md'
      - '.claude/skills/document-factory/generate.py'
      - '.github/workflows/legal-assistant-tests.yml'
  push:
    branches:
      - main
      - 'carlos/loi-v3.5*'
    paths:
      - '.claude/skills/legal-assistant/**'
      - '.claude/skills/_shared/counterpart-description-framework.md'
      - '.claude/skills/_shared/loi-*.md'
      - '.claude/skills/document-factory/generate.py'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # v3.5.8 tripwire #4: need merge-base for diff

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest python-docx pyyaml lxml

      # v3.5.8 PRINCIPLES.md tripwire #4: render-logic changes must ship
      # with a test change. Escape hatch for doc-only / comment-only edits
      # where the author knows tests are unnecessary: include the literal
      # marker [skip-test-check] in any commit message on the branch.
      - name: Enforce test-changes-with-generator-changes
        if: github.event_name == 'pull_request'
        run: |
          set -e
          BASE="origin/${{ github.base_ref }}"
          echo "Base: $BASE / Head: ${{ github.sha }}"
          CHANGED=$(git diff --name-only "$BASE"...HEAD)
          echo "--- Changed files ---"
          echo "$CHANGED"
          echo "---------------------"
          GEN_TOUCHED=$(echo "$CHANGED" | grep -E '^\.claude/skills/legal-assistant/sales/generate_loi\.py$' || true)
          TEST_TOUCHED=$(echo "$CHANGED" | grep -E '^\.claude/skills/legal-assistant/sales/tests/' || true)
          if [ -n "$GEN_TOUCHED" ] && [ -z "$TEST_TOUCHED" ]; then
            # Check for the escape-hatch marker across the PR commits.
            if git log --format=%B "$BASE"...HEAD | grep -q '\[skip-test-check\]'; then
              echo "generate_loi.py changed without test changes; [skip-test-check] marker present — allowed."
              exit 0
            fi
            echo "ERROR: generate_loi.py changed with no accompanying tests/ change."
            echo "v3.5.8 PRINCIPLES.md tripwire #4: render-logic changes must ship"
            echo "with a test exercising the new branch. If this change is genuinely"
            echo "test-free (e.g. pure docstring edit), add [skip-test-check] to any"
            echo "commit message on the branch."
            exit 1
          fi
          echo "OK: generator/test change balance satisfied."

      - name: Run legal-assistant tests
        working-directory: .claude/skills/legal-assistant/colocation
        run: |
          python -m pytest tests/ -v

      - name: Smoke-regen all intake examples
        working-directory: .claude/skills/legal-assistant/colocation
        run: |
          set -e
          for f in examples/intake_example_*.yaml; do
            echo "--- Regenerating: $f ---"
            python3 generate_loi.py "$f"
          done
          # Cleanup generated artefacts (CI log only)
          rm -f *.docx *_qa.txt

      - name: Smoke-regen v3.5 regression fixtures
        working-directory: .claude/skills/legal-assistant/colocation
        run: |
          set -e
          for f in regression/v3.5/*_intake.yaml; do
            echo "--- Regenerating: $f ---"
            python3 generate_loi.py "$f"
          done
          rm -f *.docx *_qa.txt
