# _retrieval-rules.yaml
# Centralized task-to-chunk mappings for brand reference retrieval
# Digital Energy Brand System v1.0
#
# PURPOSE: Tells downstream skills which brand reference chunks to load
# for each task type. Prevents loading entire files when only a section
# is needed. Enforces token budget discipline.
#
# USAGE: Before producing any external content, the executing skill should:
#   1. Identify the task_type from the list below
#   2. Load all chunks in always_load
#   3. Evaluate load_if_relevant based on context
#   4. Stay within token_budget for brand context
#
# CHUNK LOCATIONS:
#   de-brand-bible/references/ — verbal identity chunks
#   brand-book/tokens/          — visual design tokens
#   brand-book/exports/         — tool-specific exports

# ============================================================
# CONTENT ENGINE TASKS
# ============================================================

task_profiles:

  linkedin_post_ceo:
    description: "LinkedIn post from CEO/founder personal account"
    consuming_skill: "content-engine"
    always_load:
      - "de-brand-bible/references/voice-rules.md"
      - "de-brand-bible/references/banned-phrases.md"
      - "de-brand-bible/references/channel-adaptations.md"  # LinkedIn (executive) row
    load_if_relevant:
      - "de-brand-bible/references/proof-points.md"          # if making quantified claims
      - "de-brand-bible/references/terminology-standards.md"  # if using DE-specific terms
      - "de-brand-bible/references/buyer-personas.md"         # if targeting a specific segment
    token_budget: 1400

