dates:
  loi_date: '2026-04-17'
recitals:
- letter: C
  text: The Parties recognise that the Provider's infrastructure and the Partner's
    managed-services capabilities are complementary, and wish to explore a joint offering
    to serve enterprise customers.
clauses:
- number: '1'
  heading: Partnership Model and Joint Offering
  paragraphs:
  - 1.1 The Parties intend to develop and market an integrated offering combining
    the Provider's colocation infrastructure with the Partner's managed-services layer.
  subclauses:
  - letter: a
    text: the Provider delivers energy, cooling, and facility infrastructure at its
      DEC sites;
  - letter: b
    text: the Partner delivers compute hardware procurement, deployment, lifecycle
      management, and managed services.
- number: '2'
  heading: Commercial Workshop
  paragraphs:
  - 2.1 The Parties intend to conduct a joint commercial workshop within thirty (30)
    calendar days of LOI execution to define the integrated offering and target accounts.
- number: '3'
  heading: Non-Binding Status
  paragraphs:
  - 3.1 This LOI is non-binding. No Party is obliged to enter into any definitive
    agreement. Nothing in this LOI creates a partnership, joint venture, or agency
    relationship.
